<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow-x: hidden;
            font-family: Arial, sans-serif;
        }

        .container {
            width: 100%;
            display: flex;
            justify-content: center;
            padding: 40px 0;
        }

        .main-image {
            width: 88%;
            max-width: 1200px;
        }

        .main-image img {
            width: 100%;
            height: auto;
            object-fit: cover;
            display: block;
            border-radius: 10px;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="main-image">
            <img src="./personal portfolio.png" alt="Portfolio Image">
        </div>
    </div>

</body>

</html>
