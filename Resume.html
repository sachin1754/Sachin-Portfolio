<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            /* height: 100vh; */
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f5f5f5;
            font-family: Arial, sans-serif;
        }

        /* Resume container */
        .main {
            height: 30vh;
            margin-top: 1vw;
            width: 800px;
            /* perfect resume width */
            max-width: 90%;
            /* mobile friendly */
            background: #fff;
            /* padding: 20px; */
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
        }

        /* Image fit */
        .main img {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 5px;
        }
    </style>
</head>

<body>

    <div class="main">
        <img src="./p.jpg" alt="Resume Image">
    </div>

</body>

</html>
